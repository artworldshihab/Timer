<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Pro Timer | ! sʜᴏᴡʀᴀᴠ ⚠︎</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="theme-default">

    <!-- Step 1: Landing Page -->
    <div id="landing-page" class="landing-page">
        <div class="stars"></div>
        <div class="content">
            <h1 class="glow-text">Ramadan Pro Timer</h1>
            <p class="subtitle">! sʜᴏᴡʀᴀᴠ ⚠︎</p>
            <button id="start-btn" class="ios-btn">Start Timer</button>
            <div class="features">
                <span><i class="fas fa-clock"></i> Sehri & Iftar</span>
                <span><i class="fas fa-magic"></i> Animated Themes</span>
                <span><i class="fas fa-robot"></i> AI Suggestion</span>
            </div>
        </div>
    </div>

    <!-- Main App Layout (Hidden at first) -->
    <main id="app-container" class="hidden">
        
        <!-- Step 2: Holding Title System -->
        <header class="holding-bar">
            <input type="text" id="editable-title" value="আমাদের পরিবারের রমজান টাইমার" spellcheck="false">
            <div class="title-controls">
                <input type="color" id="title-color" title="Color">
                <select id="font-select">
                    <option value="Poppins">Poppins</option>
                    <option value="Kalpurush">Kalpurush</option>
                    <option value="Arial">Arial</option>
                </select>
            </div>
        </header>

        <!-- Step 3: Real Time Clock -->
        <div class="rt-clock" id="clock-display">00:00:00</div>

        <!-- Step 4 & 5: Sehri & Iftar Boxes -->
        <section class="prayer-times">
            <div class="timer-box sehri-box">
                <h3>সেহরির সময় বাকি</h3>
                <div id="sehri-countdown" class="count">--:--:--</div>
            </div>
            <div class="timer-box iftar-box">
                <h3>ইফতারের সময় বাকি</h3>
                <div id="iftar-countdown" class="count">--:--:--</div>
            </div>
        </section>

        <!-- Step 6 & 7: Main Timer & Liquid Animation -->
        <section class="main-timer-section">
            <div class="timer-card" id="timer-card">
                <div class="liquid-bg" id="liquid-wave"></div>
                <div class="timer-content">
                    <h2 id="main-countdown">00:00:00</h2>
                    <div class="timer-btns">
                        <button onclick="zoomTimer(1.1)" class="zoom-btn"><i class="fas fa-plus"></i></button>
                        <button id="set-timer-btn" class="action-btn">Set</button>
                        <button id="reset-btn" class="action-btn">Reset</button>
                        <button onclick="zoomTimer(0.9)" class="zoom-btn"><i class="fas fa-minus"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Step 11: AI Suggestion Box -->
        <div id="ai-suggestion-box" class="ai-box">
            <i class="fas fa-robot"></i>
            <p id="ai-text">রমজানে সুস্থ থাকতে বেশি করে পানি পান করুন।</p>
        </div>

        <!-- Step 8, 9, 10, 12: Sidebar Settings -->
        <aside class="settings-panel">
            <button id="toggle-settings"><i class="fas fa-cog"></i></button>
            <div class="panel-content">
                <h4>Themes</h4>
                <div class="theme-grid" id="theme-switcher">
                    <!-- Themes will be injected by JS -->
                </div>
                <h4>Sounds</h4>
                <select id="sound-select"></select>
                <input type="file" id="custom-audio" accept="audio/*">
                <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i> Full Screen</button>
            </div>
        </aside>

    </main>

    <audio id="alarm-sound" loop></audio>
    <script src="script.js"></script>
</body>
</html>
