<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Intel Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: #000; color: #fff; height: 100vh; width: 100vw;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Background & Animation Layers */
        #bg-image {
            position: fixed; inset: 0; z-index: -3;
            background-size: cover; background-position: center;
            transition: 1s ease-in-out;
        }

        #sky-animation {
            position: fixed; inset: 0; z-index: -2;
            pointer-events: none;
        }

        .main-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; height: 100%;
            padding: 20px; justify-content: space-between; align-items: center;
        }

        /* Top Header */
        header { text-align: center; }
        .diamond-logo {
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--accent), #fff);
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; letter-spacing: -2px;
        }
        .live-clock { font-size: 1.8rem; letter-spacing: 5px; opacity: 0.8; margin-top: 5px; }

        @keyframes shine { to { background-position: 200% center; } }

        /* Dashboard Grid */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; width: 100%; max-width: 1200px; margin: auto;
        }

        .card {
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px;
            padding: 40px 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .label { font-size: 0.8rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 10px; display: block; }
        .val { font-size: 3rem; font-weight: 900; color: var(--accent); }

        /* Mission Timer */
        .mission-display { font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--accent); }
        .picker-box { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        select {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 10px; border-radius: 15px; font-size: 1.2rem; outline: none;
        }

        .btn-start {
            width: 100%; padding: 18px; border-radius: 20px; 
            background: var(--accent); color: #000; border: none;
            font-weight: 900; cursor: pointer; font-size: 1rem;
        }

        /* Navigation Bar */
        .nav-pill {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(50px);
            border-radius: 100px; padding: 12px 40px; display: flex; gap: 40px;
            border: 1px solid rgba(255,255,255,0.15); margin-bottom: 20px;
        }

        .nav-icon { background: none; border: none; cursor: pointer; transition: 0.3s; }
        .nav-icon:hover { transform: scale(1.3); filter: drop-shadow(0 0 8px var(--accent)); }
        .nav-icon svg { width: 35px; height: 35px; fill: #fff; }

        /* Responsive */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; gap: 10px; overflow-y: auto; max-height: 60vh; }
            .card { padding: 25px 15px; }
        }

        #theme-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); padding: 40px; gap: 20px;
        }
        .thumb { aspect-ratio: 9/16; border-radius: 20px; cursor: pointer; background-size: cover; border: 2px solid transparent; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="sky-animation"></canvas>

    <div class="main-container">
        <header>
            <h1 class="diamond-logo">DIAMOND INTEL</h1>
            <div class="live-clock" id="wall-clock">00:00:00 AM</div>
        </header>

        <div class="grid">
            <div class="card">
                <span class="label">SEHRI TIME</span>
                <div class="val" id="sehri">00:00:00</div>
            </div>

            <div class="card" style="border: 2px solid var(--accent)">
                <span class="label" style="color:var(--accent)">INTEL MISSION</span>
                <div class="mission-display" id="m-display">00:00:00</div>
                <div class="picker-box" id="p-box">
                    <select id="th"></select><select id="tm"></select><select id="ts"></select>
                </div>
                <button class="btn-start" id="m-btn" onclick="runMission()">START MISSION</button>
            </div>

            <div class="card">
                <span class="label">IFTAR TIME</span>
                <div class="val" id="iftar">00:00:00</div>
            </div>
        </div>

        <nav class="nav-pill">
            <button class="nav-icon" onclick="openMenu()"><svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/></svg></button>
            <button class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg></button>
            <button class="nav-icon" onclick="document.getElementById('m-in').click()"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button>
            <button class="nav-icon" onclick="document.getElementById('i-in').click()"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14l-3.5-4.5-2.5 3.01L17 17H5V5h14v12z"/></svg></button>
        </nav>
    </div>

    <div id="theme-menu"></div>
    <input type="file" id="m-in" hidden accept="audio/*" onchange="playMusic(event)">
    <input type="file" id="i-in" hidden accept="image/*" onchange="setCustomBg(event)">
    <audio id="audio-player" loop></audio>

    <script>
        const themes = [
            {u: '1000013015.jpg', c: '#00f2ff'}, {u: '1000013014.jpg', c: '#ff8800'},
            {u: '1000013013.jpg', c: '#00ffaa'}, {u: '1000013012.jpg', c: '#ff66aa'},
            {u: '1000013011.jpg', c: '#ffffff'}, {u: '1000013010.jpg', c: '#00ffff'}
        ];

        let mInterval = null;
        let mSecs = 0;
        let particles = [];
        const canvas = document.getElementById('sky-animation');
        const ctx = canvas.getContext('2d');

        function init() {
            // Fill Pickers
            const h=document.getElementById('th'), m=document.getElementById('tm'), s=document.getElementById('ts');
            for(let i=0; i<24; i++) h.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
            for(let i=0; i<60; i++){
                m.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
                s.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
            }
            
            setTheme(themes[0]);
            window.addEventListener('resize', resize);
            resize(); 
            animateSky(); // Start Animation
            setInterval(clocks, 1000);
        }

        // --- SKY ANIMATION ENGINE ---
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        
        function animateSky() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            
            if(particles.length < 80) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    v: Math.random() * 2 + 1,
                    o: Math.random(),
                    sz: Math.random() * 2 + 1
                });
            }

            particles.forEach((p, i) => {
                ctx.globalAlpha = p.o;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2);
                ctx.fill();
                p.y += p.v;
                if(p.y > canvas.height) particles.splice(i, 1);
            });
            requestAnimationFrame(animateSky);
        }

        // --- MISSION TIMER LOGIC ---
        function runMission() {
            const btn = document.getElementById('m-btn');
            const pBox = document.getElementById('p-box');
            const disp = document.getElementById('m-display');

            if (mInterval) {
                clearInterval(mInterval);
                mInterval = null;
                btn.innerText = "START MISSION";
                btn.style.background = "var(--accent)";
                pBox.style.display = "flex";
                return;
            }

            let h = parseInt(document.getElementById('th').value) || 0;
            let m = parseInt(document.getElementById('tm').value) || 0;
            let s = parseInt(document.getElementById('ts').value) || 0;
            mSecs = (h * 3600) + (m * 60) + s;

            if (mSecs <= 0) return;

            btn.innerText = "ABORT";
            btn.style.background = "#ff3b30";
            pBox.style.display = "none";

            mInterval = setInterval(() => {
                mSecs--;
                let hh = Math.floor(mSecs/3600).toString().padStart(2,'0');
                let mm = Math.floor((mSecs%3600)/60).toString().padStart(2,'0');
                let ss = (mSecs%60).toString().padStart(2,'0');
                disp.innerText = `${hh}:${mm}:${ss}`;

                if (mSecs <= 0) {
                    clearInterval(mInterval);
                    mInterval = null;
                    alert("Mission Success!");
                    btn.innerText = "START MISSION";
                    btn.style.background = "var(--accent)";
                    pBox.style.display = "flex";
                }
            }, 1000);
        }

        function clocks() {
            const now = new Date();
            document.getElementById('wall-clock').innerText = now.toLocaleTimeString('en-US', {hour12:true});
            const calc = (h, m, id) => {
                let target = new Date(); target.setHours(h, m, 0);
                if(now > target) target.setDate(target.getDate()+1);
                let diff = target - now;
                let hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                let mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                let ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById(id).innerText = `${hh}:${mm}:${ss}`;
            }
            calc(4, 45, 'sehri');
            calc(18, 10, 'iftar');
        }

        function openMenu() {
            const m = document.getElementById('theme-menu');
            m.style.display = 'grid';
            m.innerHTML = themes.map(t => `<div class="thumb" style="background-image:url(${t.u})" onclick="setTheme({u:'${t.u}', c:'${t.c}'})"></div>`).join('');
        }

        function setTheme(t) {
            document.getElementById('bg-image').style.backgroundImage = `url(${t.u})`;
            document.documentElement.style.setProperty('--accent', t.c);
            document.getElementById('theme-menu').style.display = 'none';
            particles = []; // Refresh particles color
        }

        function playMusic(e) { const p=document.getElementById('audio-player'); p.src=URL.createObjectURL(e.target.files[0]); p.play(); }
        function setCustomBg(e) { setTheme({u: URL.createObjectURL(e.target.files[0]), c:'#00f2ff'}); }

        window.onload = init;
    </script>
</body>
</html>
