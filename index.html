<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ramadan Supreme Pro | Showrav Masterpiece</title>
    
    <!-- External Libs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@300;600;900&family=Orbitron:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Your Specific Mix: Purple, White, Lime, Yellow */
            --mix-colors: #A020F0, #FFFFFF, #32CD32, #FFFF00, #A020F0;
            --primary: #A020F0;
            --matrix: #32CD32;
            --apple-ease: cubic-bezier(0.2, 0, 0.2, 1);
            --border-width: 5px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background-size: cover; background-position: center; transition: background 1s var(--apple-ease);
            padding: 4vh 0; will-change: background;
        }

        /* Hardware Accelerated Particle Canvas */
        #particle-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; will-change: transform; opacity: 0.6; }

        /* Master Start Overlay */
        #unlock-overlay { 
            position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at center, #1a1a2e, #000); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.8s var(--apple-ease);
        }
        .orb-loader { width: 100px; height: 100px; background: var(--matrix); border-radius: 50%; filter: blur(40px); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 0.8; } }

        /* Super Smooth Rotating Border */
        .luxury-glow {
            position: relative; padding: var(--border-width); border-radius: 25px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; transform: translateZ(0); /* Force GPU */
        }
        .luxury-glow::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(var(--mix-colors)); animation: rotateGlow 4s linear infinite;
            will-change: transform;
        }
        .inner-content { position: relative; z-index: 5; background: #000; border-radius: 20px; width: 100%; height: 100%; }
        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 1. Header: Liquid Text Gradient Title */
        .header-section { z-index: 1000; text-align: center; width: 100%; }
        #editable-title { 
            display: inline-block; font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; 
            text-align: center; outline: none; letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(90deg, var(--mix-colors));
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: liquidText 5s infinite linear;
            cursor: text;
        }
        @keyframes liquidText { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .mini-rtc { font-family: 'Share Tech Mono', monospace; font-size: 1.3rem; color: #ffeb3b; margin-top: 5px; opacity: 0.9; }

        /* 2. Middle Section (Precision Position) */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 5vh; transform: scale(1); transition: 0.5s var(--apple-ease); }

        .prayer-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .p-card { width: clamp(150px, 15vw, 220px); padding: 15px 0; text-align: center; }
        .p-card small { font-size: 0.7rem; letter-spacing: 4px; color: #fff; opacity: 0.6; text-transform: uppercase; }
        .p-card p { font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; font-weight: bold; color: var(--matrix); }

        .timer-grid { display: flex; gap: clamp(10px, 2.5vw, 25px); justify-content: center; align-items: center; }
        .box { width: clamp(100px, 18vw, 170px); height: clamp(130px, 22vw, 210px); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .box span { font-family: 'Share Tech Mono', monospace; font-size: clamp(3rem, 7vw, 5.5rem); color: var(--matrix); z-index: 10; text-shadow: 0 0 25px var(--matrix); }
        .box small { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.5; z-index: 10; margin-top: 8px; }
        .liquid-fill { position: absolute; bottom: 0; width: 100%; background: var(--matrix); opacity: 0.2; transition: height 1s; z-index: 1; }

        /* 3. Bottom Section: Apple Navigation Dock */
        .dock-container { z-index: 8000; margin-bottom: 10px; }
        .ios-dock { 
            display: flex; gap: 12px; background: rgba(255, 255, 255, 0.1); 
            padding: 12px 25px; border-radius: 50px; backdrop-filter: var(--ios-blur); 
            border: 1px solid rgba(255,255,255,0.15);
        }
        .dock-btn { 
            width: 52px; height: 52px; border-radius: 50%; background: #fff; color: #000; 
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem; transition: 0.3s var(--apple-ease);
        }
        .dock-btn:active { transform: scale(0.7) translateY(8px); background: var(--matrix); color: #fff; }

        /* Modals (Hardware Accelerated) */
        #ai-container, #timer-picker, .theme-overlay { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(10,10,12,0.99); border-radius: 45px; border: 2px solid var(--matrix); 
            display: none; backdrop-filter: blur(50px); z-index: 15000; overflow: hidden; box-shadow: 0 50px 150px #000;
            will-change: transform, opacity;
        }

        #timer-picker { padding: 45px; width: 380px; text-align: center; }
        .picker-row { display: flex; gap: 12px; justify-content: center; margin: 30px 0; }
        .picker-row input { width: 85px; height: 85px; background: #222; border: 2.5px solid var(--matrix); border-radius: 20px; color: #fff; font-size: 2.5rem; text-align: center; font-family: 'Share Tech Mono'; outline: none; }

        #yt-api-frame { position: absolute; top: -5000px; left: -5000px; visibility: hidden; }
        
        /* Centered iMessage AI */
        #ai-container { width: 94%; max-width: 480px; height: 650px; flex-direction: column; }
        .ai-header { padding: 25px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .ai-chat-view { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble { padding: 15px 22px; border-radius: 28px; max-width: 85%; font-size: 1.1rem; line-height: 1.5; }
        .u-msg { background: #007aff; align-self: flex-end; color: #fff; }
        .a-msg { background: #26262b; align-self: flex-start; border: 1px solid #333; }

        .theme-overlay { width: 95%; height: 90%; padding: 50px; overflow-y: auto; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; margin-top: 40px; }
        .t-card { height: 140px; border-radius: 35px; cursor: pointer; background-size: cover; background-position: center; border: 3px solid transparent; transition: 0.4s; }
    </style>
</head>
<body id="master-root">

    <canvas id="particle-canvas"></canvas>

    <!-- Professional Initialize Button -->
    <div id="unlock-overlay" onclick="launchApp()">
        <div class="orb-loader"></div>
        <h1 style="margin-top: 40px; letter-spacing: 12px; font-weight: 900; color:#fff;">RAMADAN SUPREME</h1>
        <p style="opacity: 0.7; font-size: 1.2rem; color:#fff; margin-top: 15px;">INITIALIZING HARDWARE ACCELERATION...</p>
        <p style="opacity: 0.4; font-size: 0.8rem; margin-top: 80px; color: var(--matrix);">TV OPTIMIZED | NARAYANGANJ RUPSI PRECISION</p>
    </div>

    <!-- YouTube Music API -->
    <div id="yt-api-frame"></div>

    <!-- Header (Always Centered) -->
    <header class="header-section">
        <h1 id="editable-title" contenteditable="true">RAMADAN TIMER</h1>
        <div class="mini-rtc" id="apple-rtc">00:00:00 PM</div>
    </header>

    <!-- Precision Content Area -->
    <main class="main-content" id="main-viewport">
        <div class="prayer-row">
            <div class="luxury-glow"><div class="inner-content p-card"><small>SEHRI</small><p id="sehri-rem">--:--:--</p></div></div>
            <div class="luxury-glow"><div class="inner-content p-card"><small>IFTAR</small><p id="iftar-rem">--:--:--</p></div></div>
        </div>

        <div class="timer-grid">
            <div class="luxury-glow"><div class="inner-content box"><div class="liquid-fill" id="l-h"></div><span id="v-h">00</span><small>Hours</small></div></div>
            <div class="luxury-glow"><div class="inner-content box"><div class="liquid-fill" id="l-m"></div><span id="v-m">00</span><small>Min</small></div></div>
            <div class="luxury-glow"><div class="inner-content box"><div class="liquid-fill" id="l-s"></div><span id="v-s">00</span><small>Sec</small></div></div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <button class="dock-btn" onclick="openTimerPicker()" style="width: auto; padding: 0 45px; border-radius: 18px; font-weight: 900; background: #fff; font-size: 1.1rem;">SET TIMER</button>
            <button class="dock-btn" onclick="resetTimer()" style="width: auto; padding: 0 45px; border-radius: 18px; font-weight: 900; background: #ff3b30; color:#fff; font-size: 1.1rem;">RESET</button>
        </div>
    </main>

    <!-- Navigation Dock -->
    <footer class="dock-container">
        <div class="ios-dock">
            <button class="dock-btn" onclick="doZoom(1.1)" title="Zoom In"><i class="fas fa-plus"></i></button>
            <button class="dock-btn" onclick="doZoom(0.9)" title="Zoom Out"><i class="fas fa-minus"></i></button>
            <button class="dock-btn" onclick="toggleThemes()" title="Themes"><i class="fas fa-palette"></i></button>
            <input type="file" id="img-up" hidden accept="image/*" onchange="handleImage(event)">
            <button class="dock-btn" onclick="document.getElementById('img-up').click()" title="Upload Image"><i class="fas fa-image"></i></button>
            <input type="file" id="aud-up" hidden accept="audio/*" onchange="handleAudio(event)">
            <button class="dock-btn" onclick="document.getElementById('aud-up').click()" title="Upload Music"><i class="fas fa-music"></i></button>
            <button class="dock-btn" onclick="toggleAI()" title="Showrav AI"><i class="fas fa-robot"></i></button>
            <button class="dock-btn" onclick="toggleFull()" title="Fullscreen"><i class="fas fa-expand"></i></button>
        </div>
    </footer>

    <!-- AI Modal -->
    <div id="ai-container">
        <div class="ai-header">
            <div class="luxury-glow" style="width:45px; height:45px; border-radius:50%;"><div class="inner-content" style="border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-atom"></i></div></div>
            <div style="margin-left: 15px;">
                <p style="font-weight: 900; font-size: 1.2rem;">Showrav AI Assistant</p>
                <p style="font-size: 0.6rem; color: #32d74b;">● ACTIVE</p>
            </div>
            <button onclick="toggleAI()" style="margin-left:auto; background:none; border:none; color:#888; font-size:2rem;"><i class="fas fa-times"></i></button>
        </div>
        <div class="ai-chat-view" id="ai-box"></div>
        <div style="padding: 25px; display: flex; gap: 12px; background: #151515;">
            <input type="text" id="ai-in" placeholder="Ask Showrav anything..." onkeypress="if(event.key==='Enter') sendAI()" style="flex:1; background:#222; border:none; border-radius:30px; padding:15px 25px; color:#fff; outline:none; font-size: 1.1rem;">
            <button class="dock-btn" onclick="sendAI()" style="background:var(--matrix); width:50px; height:50px; color:#000"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Timer Picker -->
    <div id="timer-picker">
        <h2 style="margin-bottom: 25px; font-weight: 900;">SET TIMER</h2>
        <div class="picker-row">
            <div><input type="number" id="in-h" value="00" min="0" max="23"><label>Hrs</label></div>
            <div><input type="number" id="in-m" value="00" min="0" max="59"><label>Min</label></div>
            <div><input type="number" id="in-s" value="00" min="0" max="59"><label>Sec</label></div>
        </div>
        <button class="dock-btn" onclick="applyTimer()" style="width: 100%; background: #fff; font-weight: 900; height: 60px; font-size: 1.2rem; color:#000">START</button>
        <button class="dock-btn" onclick="closePicker()" style="width: 100%; margin-top: 15px; background: transparent; color: #ff3b30; border: 1px solid #333;">CANCEL</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer, timerInt, remSecs = 0, totalSecs = 0, scale = 1, currentEffect = 'stars';

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-api-frame', {
                height: '0', width: '0',
                videoId: 't9L8b9eluFI',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 't9L8b9eluFI' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function launchApp() {
            document.getElementById('unlock-overlay').style.transform = "translateY(-100%)";
            if(ytPlayer) { ytPlayer.unMute(); ytPlayer.playVideo(); }
            document.documentElement.requestFullscreen().catch(() => {});
            initApp();
        }

        function initApp() {
            setInterval(() => { document.getElementById('apple-rtc').innerText = new Date().toLocaleTimeString('en-US', { hour12: true }); }, 1000);
            fetchRupsi();
            animateParticles();
        }

        async function fetchRupsi() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Narayanganj&country=Bangladesh&method=2');
                const data = await res.json();
                const t = data.data.timings;
                startCount(t.Fajr, 'sehri-rem', 2); // Rupsi Precision
                startCount(t.Maghrib, 'iftar-rem', 2);
            } catch(e) { }
        }

        function startCount(time, id, offset) {
            setInterval(() => {
                const now = new Date();
                const [h, m] = time.split(':');
                const target = new Date(); target.setHours(parseInt(h), parseInt(m) + offset, 0);
                if(target < now) target.setDate(target.getDate() + 1);
                const diff = target - now;
                const hh = Math.floor(diff/3600000), mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000);
                document.getElementById(id).innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
            }, 1000);
        }

        function openTimerPicker() { document.getElementById('timer-picker').style.display = 'block'; }
        function closePicker() { document.getElementById('timer-picker').style.display = 'none'; }
        function applyTimer() {
            const h = parseInt(document.getElementById('in-h').value) || 0;
            const m = parseInt(document.getElementById('in-m').value) || 0;
            const s = parseInt(document.getElementById('in-s').value) || 0;
            remSecs = (h * 3600) + (m * 60) + s;
            totalSecs = remSecs;
            if(remSecs > 0) {
                clearInterval(timerInt);
                timerInt = setInterval(() => {
                    if(remSecs <= 0) { clearInterval(timerInt); alert("Time Up!"); return; }
                    remSecs--; updateTimerUI();
                }, 1000);
                closePicker();
            }
        }
        function updateTimerUI() {
            document.getElementById('v-h').innerText = String(Math.floor(remSecs/3600)).padStart(2,'0');
            document.getElementById('v-m').innerText = String(Math.floor((remSecs%3600)/60)).padStart(2,'0');
            document.getElementById('v-s').innerText = String(remSecs%60).padStart(2,'0');
            document.querySelectorAll('.liquid-fill').forEach(l => l.style.height = (remSecs/totalSecs)*100 + '%');
        }
        function resetTimer() { remSecs = 0; updateTimerUI(); clearInterval(timerInt); }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; this.vY = Math.random() * 0.8 + 0.3;
                this.vX = Math.random() * 0.5 - 0.25;
            }
            update() { this.y += this.vY; this.x += this.vX; if(this.y > canvas.height) this.y = -10; }
            draw() { ctx.beginPath(); ctx.fillStyle = '#fff'; ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        }
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            if(particles.length < 50) particles.push(new Particle());
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        function doZoom(v) { scale = v > 1 ? scale + 0.1 : scale - 0.1; document.getElementById('main-viewport').style.transform = `scale(${scale})`; }
        function toggleAI() { let p = document.getElementById('ai-container'); p.style.display = (p.style.display==='flex'?'none':'flex'); }
        function toggleFull() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function handleImage(e) { const r = new FileReader(); r.onload = (f) => { document.body.style.backgroundImage = `url('${f.target.result}')`; document.body.style.backgroundSize = "cover"; }; r.readAsDataURL(e.target.files[0]); }
        function handleAudio(e) { const url = URL.createObjectURL(e.target.files[0]); const a = new Audio(url); a.loop = true; a.play(); document.getElementById('yt-api-frame').innerHTML=""; }

        function sendAI() {
            const inp = document.getElementById('ai-in');
            const msg = inp.value.trim(); if(!msg) return;
            addBubble(msg, 'u-msg'); inp.value = '';
            setTimeout(() => {
                let r = "আপনার জিজ্ঞাসাটি চমৎকার। আমি সৌরভের তৈরি রমজান এআই।";
                if(msg.toLowerCase().includes("সালাম")) r = "ওয়ালাইকুম আসসালাম! আপনার দিনটি শুভ হোক।";
                if(msg.toLowerCase().includes("কে বানিয়েছে")) r = "এই পুরো সিস্টেমটি সৌরভ (Showrav) তার কোডিং প্রতিভা দিয়ে তৈরি করেছেন।";
                addBubble(r, 'a-msg');
            }, 600);
        }
        function addBubble(t, c) {
            const box = document.getElementById('ai-box');
            const d = document.createElement('div'); d.className = `bubble ${c}`; d.innerText = t;
            box.appendChild(d); box.scrollTop = box.scrollHeight;
        }
        function toggleThemes() { alert("Use the Upload Image icon to set 4K background."); }
    </script>
</body>
</html>
