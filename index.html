<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIHAB Ramadan Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Hind+Siliguri:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Hind Siliguri', sans-serif; }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Dynamic Dynamic Background --- */
        #bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Main Layout --- */
        .container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            justify-content: space-between;
        }

        /* --- Heading & Real Clock --- */
        header { text-align: center; margin-top: 10px; }
        .diamond-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--accent), #fff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            margin-bottom: 5px;
        }
        .real-time {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
        }

        @keyframes shine { to { background-position: 200%; } }

        /* --- Timer Cards Grid --- */
        .main-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            align-items: center;
            justify-items: center;
        }

        .timer-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 30px;
            border-radius: 35px;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 350px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .label { color: var(--accent); font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .countdown { font-size: 3.5rem; font-weight: 900; line-height: 1; }

        /* --- Center iPhone Style Set Timer --- */
        .iphone-setter {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 40px;
            border: 1px solid var(--accent);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .iphone-setter select {
            background: transparent; border: none; color: white; font-size: 1.5rem; outline: none; cursor: pointer;
        }

        /* --- Theme Selector Menu --- */
        #theme-menu {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            overflow-y: auto;
        }

        .theme-item {
            aspect-ratio: 9/16;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            background-size: cover;
            background-position: center;
        }
        .theme-item:hover { border-color: var(--accent); transform: scale(1.05); }

        /* --- AI Interface (Center Mode) --- */
        #ai-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 450px;
            height: 60vh;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid var(--accent);
            display: none;
            flex-direction: column;
            z-index: 4000;
        }

        /* --- Pill Navigation --- */
        .pill-bar {
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 15px 30px;
            border-radius: 100px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-self: center;
            margin-bottom: 20px;
            max-width: 95vw;
            overflow-x: auto;
        }

        .pill-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: white; padding: 10px 20px;
            border-radius: 50px; cursor: pointer; white-space: nowrap;
            font-weight: 600; transition: 0.3s;
        }
        .pill-btn:hover { background: var(--accent); color: #000; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .countdown { font-size: 2.5rem; }
            .pill-bar { padding: 10px 15px; gap: 8px; }
            .pill-btn { padding: 8px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <header>
            <h1 class="diamond-title" contenteditable="true">Ramadan Diamond Pro</h1>
            <div class="real-time" id="real-clock">00:00:00 AM</div>
        </header>

        <div class="main-display">
            <div class="timer-card">
                <span class="label">SEHERI</span>
                <div class="countdown" id="sehri-rem">00:00:00</div>
                <div style="margin-top:15px; opacity:0.6">সময়: ০৪:৪৫ AM</div>
            </div>

            <div class="timer-card" style="border-color: var(--accent); background: rgba(0,242,255,0.05);">
                <span class="label">কাস্টম টাইমার</span>
                <div class="iphone-setter">
                    <select id="th"></select> :
                    <select id="tm"></select> :
                    <select id="ts"></select>
                </div>
                <button class="pill-btn" style="margin-top:15px; width:100%; background:var(--accent); color:#000;" onclick="startCustomTimer()">Start</button>
            </div>

            <div class="timer-card">
                <span class="label">IFTER</span>
                <div class="countdown" id="iftar-rem">00:00:00</div>
                <div style="margin-top:15px; opacity:0.6">সময়: ০৬:১০ PM</div>
            </div>
        </div>

        <div class="pill-bar">
            <button class="pill-btn" onclick="openThemes()">থিম সিলেক্ট করুন 🎨</button>
            <button class="pill-btn" onclick="toggleAI()">Diamond AI 🤖</button>
            <button class="pill-btn" onclick="document.getElementById('music-upload').click()">SONG 🎵</button>
            <button class="pill-btn" onclick="document.getElementById('bg-upload').click()">THEME 🖼️</button>
            <button class="pill-btn" onclick="toggleFS()">Full Screen</button>
        </div>
    </div>

    <div id="theme-menu">
        <h2 style="margin-bottom: 30px; font-size: 2rem;">Select Theme</h2>
        <div class="theme-grid" id="theme-grid"></div>
        <button class="pill-btn" style="margin-top: 30px; padding: 15px 40px;" onclick="closeThemes()">Back</button>
    </div>

    <div id="ai-overlay">
        <div style="padding: 20px; border-bottom: 1px solid #333; text-align: center; font-weight: bold;">DIAMOND AI CHAT</div>
        <div id="chat-box" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="padding: 15px; display:flex; gap:10px;">
            <input type="text" id="ai-input" placeholder="প্রশ্ন করুন..." style="flex:1; background:#222; border:none; border-radius:15px; padding:12px; color:white;">
            <button class="pill-btn" onclick="askAI()">↑</button>
        </div>
        <button class="pill-btn" style="margin:10px;" onclick="toggleAI()">Close</button>
    </div>

    <input type="file" id="bg-upload" hidden accept="image/*" onchange="uploadTheme(event)">
    <input type="file" id="music-upload" hidden accept="audio/*" onchange="uploadMusic(event)">
    <audio id="bg-music" loop></audio>

    <script>
        const themes = [
            { name: 'Medina Night', url: 'https://images.unsplash.com/photo-1590076175470-7097fa59c8a8?q=80&w=1000', type: 'snow' },
            { name: 'Green Mosque', url: 'https://images.unsplash.com/photo-1566454419290-28221530adbd?q=80&w=1000', type: 'dust' },
            { name: 'Clock Tower', url: 'https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=1000', type: 'stars' },
            { name: 'Ocean Calm', url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1000', type: 'ocean' },
            { name: 'Desert Night', url: 'https://images.unsplash.com/photo-1506477331477-33d6d8b3dc85?q=80&w=1000', type: 'dust' }
        ];

        let currentType = 'snow';
        const sehriTime = "04:45";
        const iftarTime = "18:10";

        // --- iPhone Picker Init ---
        function initPickers() {
            const h = document.getElementById('th'), m = document.getElementById('tm'), s = document.getElementById('ts');
            for(let i=0; i<24; i++) h.innerHTML += `<option>${i.toString().padStart(2,'0')}</option>`;
            for(let i=0; i<60; i++) {
                m.innerHTML += `<option>${i.toString().padStart(2,'0')}</option>`;
                s.innerHTML += `<option>${i.toString().padStart(2,'0')}</option>`;
            }
        }

        // --- Real Time Clock & Countdowns ---
        function updateAll() {
            const now = new Date();
            document.getElementById('real-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: true});

            const calc = (timeStr, elId) => {
                const target = new Date();
                const [h, m] = timeStr.split(':');
                target.setHours(h, m, 0);
                if (now > target) target.setDate(target.getDate() + 1);
                const diff = target - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById(elId).innerText = `${hh}:${mm}:${ss}`;
            };
            calc(sehriTime, 'sehri-rem');
            calc(iftarTime, 'iftar-rem');
        }

        // --- Dynamic Canvas Engine ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 2 + 1,
                r: Math.random() * 3 + 1
            });
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
                p.y += p.v;
                if(currentType === 'dust') p.x += 1;
                if(p.y > canvas.height) p.y = -10;
                if(p.x > canvas.width) p.x = -10;
            });
            requestAnimationFrame(draw);
        }

        // --- Theme System ---
        function openThemes() {
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = '';
            themes.forEach(t => {
                const div = document.createElement('div');
                div.className = 'theme-item';
                div.style.backgroundImage = `url(${t.url})`;
                div.onclick = () => selectTheme(t);
                grid.appendChild(div);
            });
            document.getElementById('theme-menu').style.display = 'flex';
        }

        function selectTheme(t) {
            document.getElementById('bg-layer').style.backgroundImage = `url(${t.url})`;
            currentType = t.type;
            closeThemes();
        }

        function uploadTheme(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('bg-layer').style.backgroundImage = `url(${url})`;
            closeThemes();
        }

        function uploadMusic(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            const p = document.getElementById('bg-music');
            p.src = url; p.play();
        }

        // --- AI System ---
        function toggleAI() {
            const el = document.getElementById('ai-overlay');
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
        }

        function askAI() {
            const inp = document.getElementById('ai-input');
            const box = document.getElementById('chat-box');
            if(!inp.value) return;

            box.innerHTML += `<div style="align-self: flex-end; background:var(--accent); color:#000; padding:10px; border-radius:15px;">${inp.value}</div>`;
            
            // Diamond AI Response Logic
            setTimeout(() => {
                let res = "দুঃখিত, আমি এটি এখনো শিখছি। তবে আজকের ইফতারের সময় হলো সন্ধ্যা ০৬:১০ মিনিট।";
                if(inp.value.includes("সেহেরী")) res = "সেহেরীর শেষ সময় হলো ভোর ০৪:৪৫ মিনিট।";
                box.innerHTML += `<div style="align-self: flex-start; background:#333; padding:10px; border-radius:15px;">AI: ${res}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
            inp.value = '';
        }

        // Utilities
        function closeThemes() { document.getElementById('theme-menu').style.display = 'none'; }
        function toggleFS() { 
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        window.onload = () => {
            initPickers();
            initCanvas();
            draw();
            selectTheme(themes[0]);
            setInterval(updateAll, 1000);
        };
        window.onresize = initCanvas;
    </script>
</body>
</html>
